name: Build Unified NDI Multichannel Bridge

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Check out bridge
        uses: actions/checkout@v4

      - name: Fetch OBS plugin build infrastructure
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git clone --depth 1 https://github.com/obsproject/obs-plugintemplate.git _template

          Copy-Item -Recurse -Force _template/cmake ./cmake
          Copy-Item -Recurse -Force _template/.github/scripts ./.github/scripts

          # Build-Windows.ps1 configures with the windows-ci-x64 preset.
          # The previous workflow copied the scripts but omitted the preset file.
          Copy-Item -Force _template/CMakePresets.json ./CMakePresets.json

          if (-not (Test-Path ./CMakePresets.json)) {
            throw 'CMakePresets.json was not copied to the repository root.'
          }

      - name: Fetch NDI SDK headers from DistroAV 6.2.1
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git clone --depth 1 --branch 6.2.1 https://github.com/DistroAV/DistroAV.git _distroav
          New-Item -ItemType Directory -Force lib/ndi | Out-Null
          Copy-Item -Recurse -Force _distroav/lib/ndi/* lib/ndi/

      - name: Validate build inputs
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $required = @(
            'CMakeLists.txt',
            'CMakePresets.json',
            'buildspec.json',
            '.github/scripts/Build-Windows.ps1',
            'lib/ndi'
          )
          foreach ($item in $required) {
            if (-not (Test-Path $item)) {
              throw "Required build input missing: $item"
            }
          }
          cmake --list-presets

      - name: Configure and build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & .github/scripts/Build-Windows.ps1 -Target x64 -Configuration RelWithDebInfo

      - name: Create portable package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $out = 'release/NDI-Multichannel-Bridge-0.2.1-windows-x64'
          New-Item -ItemType Directory -Force "$out/obs-plugins/64bit" | Out-Null
          New-Item -ItemType Directory -Force "$out/data/obs-plugins/ndi-multichannel-bridge/locale" | Out-Null

          $dll = Get-ChildItem -Recurse -Filter 'ndi-multichannel-bridge.dll' |
            Where-Object { $_.FullName -match 'RelWithDebInfo|Release' } |
            Select-Object -First 1

          if (-not $dll) {
            throw 'Built plugin DLL not found.'
          }

          Copy-Item $dll.FullName "$out/obs-plugins/64bit/ndi-multichannel-bridge.dll"
          Copy-Item data/locale/* "$out/data/obs-plugins/ndi-multichannel-bridge/locale/"

          $docs = @('README.md', 'INSTALL-AND-USE.md', 'LICENSE', 'THIRD_PARTY_NOTICES.md')
          foreach ($doc in $docs) {
            if (Test-Path $doc) {
              Copy-Item $doc $out/
            }
          }

          Compress-Archive `
            -Path "$out/*" `
            -DestinationPath 'release/NDI-Multichannel-Bridge-0.2.1-windows-x64.zip' `
            -Force

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: NDI-Multichannel-Bridge-0.2.1-windows-x64
          path: release/NDI-Multichannel-Bridge-0.2.1-windows-x64.zip
          if-no-files-found: error
